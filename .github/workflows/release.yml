name: CI/CD Pipeline (Semantic Release & Docker)

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ejecutar Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    name: Build & Push Docker
    needs: release
    if: ${{ needs.release.outputs.new_release_published == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código (Versión nueva)
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.new_release_version }}

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y empujar imagen de Docker
        run: |
          # Comando simplificado para evitar errores de argumentos
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend2-week5-activity:${{ needs.release.outputs.new_release_version }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/frontend2-week5-activity:${{ needs.release.outputs.new_release_version }} ${{ secrets.DOCKER_USERNAME }}/frontend2-week5-activity:latest
          
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend2-week5-activity:${{ needs.release.outputs.new_release_version }}
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend2-week5-activity:latest