name: CI/CD Pipeline (Semantic Release & Docker)

on:
  push:
    branches:
      - main

permissions:
  contents: write # Necesario para que el bot pueda hacer commits y crear tags
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ejecutar Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    name: Build & Push Docker
    needs: release
    # Solo se ejecuta si Semantic Release publica una versión
    if: ${{ needs.release.outputs.new_release_published == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código (Versión nueva)
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.new_release_version }}

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y empujar imagen de Docker
        run: |
          VERSION=${{ needs.release.outputs.new_release_version }}
          # Usamos el nombre de tu repositorio de Docker Hub
          DOCKER_REPO="${{ secrets.DOCKER_USERNAME }}/frontend2-week5-activity"

          echo "Construyendo imagen $DOCKER_REPO:$VERSION..."

          # El punto al final es CRÍTICO para que no dé error de argumentos
          docker build -t $DOCKER_REPO:$VERSION .
          docker tag $DOCKER_REPO:$VERSION $DOCKER_REPO:latest

          echo "Subiendo imágenes a Docker Hub..."
          docker push $DOCKER_REPO:$VERSION
          docker push $DOCKER_REPO:latest